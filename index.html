<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的第一个网站</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #f0f2f5;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        button {
            background: #00a1d6;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 16px;
        }
        button:hover {
            background: #0084b4;
        }
        #message {
            margin-top: 20px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎉 你好，世界！</h1>
        <p>这是我的第一个网站</p >
        <button id="clickBtn">点我一下</button>
        <div id="message"></div>
    </div>

    <script>
        const btn = document.getElementById('clickBtn');
        const msgDiv = document.getElementById('message');
        btn.addEventListener('click', () => {
            msgDiv.innerHTML = '✨ 你触发了 JavaScript 事件 ✨';
        });
    </script>
</body>
</html>
